# Supabase project configuration
# Run: supabase link --project-ref YOUR_PROJECT_REF

[api]
enabled = true
port = 54321

[db]
port = 54322
shadow_port = 54320
major_version = 15

[studio]
enabled = true
port = 54323

[inbucket]
enabled = true
port = 54324

[storage]
enabled = true

[auth]
enabled = true
site_url = "https://app.mooser.email"
additional_redirect_urls = ["https://app.mooser.email/inbox", "http://localhost:4002/inbox"]
jwt_expiry = 3600
enable_signup = true

[auth.email]
enable_signup = true
double_confirm_changes = true
enable_confirmations = true

[functions.store-key]
verify_jwt = true

[functions.stripe-webhook]
verify_jwt = false
