<!DOCTYPE html>
<html lang="en" xmlns="http://www.w3.org/1999/xhtml">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <meta http-equiv="X-UA-Compatible" content="IE=edge">
  <title>Confirm your Moosermail account</title>
</head>
<body style="margin:0;padding:0;background-color:#f2f2f2;-webkit-font-smoothing:antialiased;">
<table width="100%" cellpadding="0" cellspacing="0" border="0" style="background-color:#f2f2f2;">
  <tr>
    <td align="center" style="padding:48px 16px 64px;">
      <table width="100%" cellpadding="0" cellspacing="0" border="0" style="max-width:520px;">

        <!-- Wordmark -->
        <tr>
          <td align="center" style="padding-bottom:32px;">
            <a href="https://mooser.email" style="text-decoration:none;">
              <span style="font-family:Impact,'Arial Black',Arial,sans-serif;font-size:20px;letter-spacing:6px;color:#0d0d0d;text-transform:uppercase;">MOOSERMAIL</span>
            </a>
          </td>
        </tr>

        <!-- Card -->
        <tr>
          <td style="background-color:#ffffff;border-radius:28px;border:1px solid #d0d0d0;padding:48px 44px 44px;box-shadow:0 4px 32px rgba(0,0,0,.08);">

            <!-- Eyebrow -->
            <p style="margin:0 0 12px;font-family:Arial,sans-serif;font-size:11px;letter-spacing:4px;text-transform:uppercase;color:#888;">ACCOUNT SETUP</p>

            <!-- Heading -->
            <h1 style="margin:0 0 16px;font-family:Impact,'Arial Black',Arial,sans-serif;font-size:42px;letter-spacing:1px;line-height:1;color:#0d0d0d;text-transform:uppercase;">CONFIRM<br>YOUR EMAIL.</h1>

            <!-- Body -->
            <p style="margin:0 0 36px;font-family:Arial,Helvetica,sans-serif;font-size:15px;line-height:1.7;color:#555;letter-spacing:0.3px;">
              You're almost in. Click the button below to confirm your email address and activate your Moosermail account.
            </p>

            <!-- CTA -->
            <table cellpadding="0" cellspacing="0" border="0" style="margin-bottom:36px;">
              <tr>
                <td style="background-color:#0d0d0d;border-radius:100px;">
                  <a href="{{ .ConfirmationURL }}" style="display:inline-block;padding:15px 36px;font-family:Impact,'Arial Black',Arial,sans-serif;font-size:14px;letter-spacing:4px;color:#f2f2f2;text-decoration:none;text-transform:uppercase;white-space:nowrap;">CONFIRM EMAIL</a>
                </td>
              </tr>
            </table>

            <!-- Divider -->
            <table cellpadding="0" cellspacing="0" border="0" width="100%" style="margin-bottom:24px;">
              <tr><td style="border-top:1px solid #d0d0d0;font-size:0;">&nbsp;</td></tr>
            </table>

            <!-- Fallback link -->
            <p style="margin:0 0 6px;font-family:Arial,sans-serif;font-size:11px;letter-spacing:2px;text-transform:uppercase;color:#888;">Or copy this link</p>
            <p style="margin:0;font-family:'Courier New',monospace;font-size:11px;color:#888;word-break:break-all;line-height:1.6;">{{ .ConfirmationURL }}</p>

          </td>
        </tr>

        <!-- Footer -->
        <tr>
          <td align="center" style="padding-top:32px;">
            <p style="margin:0 0 6px;font-family:Arial,sans-serif;font-size:11px;letter-spacing:3px;text-transform:uppercase;color:#888;">MOOSERMAIL</p>
            <p style="margin:0;font-family:Arial,sans-serif;font-size:11px;color:#aaa;">
              <a href="https://mooser.email" style="color:#888;text-decoration:none;">mooser.email</a>
              &nbsp;&middot;&nbsp;
              <span>Didn't sign up? Ignore this.</span>
            </p>
          </td>
        </tr>

      </table>
    </td>
  </tr>
</table>
</body>
</html>
