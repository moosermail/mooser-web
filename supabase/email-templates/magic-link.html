<!DOCTYPE html>
<html lang="en" xmlns="http://www.w3.org/1999/xhtml">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <meta http-equiv="X-UA-Compatible" content="IE=edge">
  <title>Your Moosermail sign-in link</title>
</head>
<body style="margin:0;padding:0;background-color:#0d0d0d;-webkit-font-smoothing:antialiased;">
<table width="100%" cellpadding="0" cellspacing="0" border="0" style="background-color:#0d0d0d;">
  <tr>
    <td align="center" style="padding:48px 16px 64px;">
      <table width="100%" cellpadding="0" cellspacing="0" border="0" style="max-width:520px;">

        <!-- Wordmark -->
        <tr>
          <td align="center" style="padding-bottom:36px;">
            <a href="https://mooser.email" style="text-decoration:none;">
              <span style="font-family:Impact,'Arial Black',Arial,sans-serif;font-size:22px;letter-spacing:6px;color:#f2f2f2;text-transform:uppercase;">MOOSERMAIL</span>
            </a>
          </td>
        </tr>

        <!-- Card -->
        <tr>
          <td style="background-color:#161616;border-radius:20px;border:1px solid #2a2a2a;padding:48px 44px 44px;">

            <!-- Eyebrow -->
            <p style="margin:0 0 12px;font-family:Arial,sans-serif;font-size:11px;letter-spacing:4px;text-transform:uppercase;color:#666;">SIGN IN</p>

            <!-- Heading -->
            <h1 style="margin:0 0 16px;font-family:Impact,'Arial Black',Arial,sans-serif;font-size:42px;letter-spacing:1px;line-height:1;color:#f2f2f2;text-transform:uppercase;">YOUR MAGIC<br>LINK.</h1>

            <!-- Body -->
            <p style="margin:0 0 36px;font-family:Arial,Helvetica,sans-serif;font-size:15px;line-height:1.7;color:#888;letter-spacing:0.3px;">
              One click and you're in. This link expires in 1 hour and can only be used once.
            </p>

            <!-- CTA -->
            <table cellpadding="0" cellspacing="0" border="0" style="margin-bottom:36px;">
              <tr>
                <td style="background-color:#f2f2f2;border-radius:100px;">
                  <a href="{{ .ConfirmationURL }}" style="display:inline-block;padding:15px 36px;font-family:Impact,'Arial Black',Arial,sans-serif;font-size:14px;letter-spacing:4px;color:#0d0d0d;text-decoration:none;text-transform:uppercase;white-space:nowrap;">SIGN IN NOW</a>
                </td>
              </tr>
            </table>

            <!-- Divider -->
            <table cellpadding="0" cellspacing="0" border="0" width="100%" style="margin-bottom:24px;">
              <tr><td style="border-top:1px solid #2a2a2a;font-size:0;">&nbsp;</td></tr>
            </table>

            <!-- Fallback link -->
            <p style="margin:0 0 6px;font-family:Arial,sans-serif;font-size:11px;letter-spacing:2px;text-transform:uppercase;color:#444;">Or copy this link</p>
            <p style="margin:0;font-family:'Courier New',monospace;font-size:11px;color:#555;word-break:break-all;line-height:1.6;">{{ .ConfirmationURL }}</p>

          </td>
        </tr>

        <!-- Footer -->
        <tr>
          <td align="center" style="padding-top:32px;">
            <p style="margin:0 0 6px;font-family:Arial,sans-serif;font-size:11px;letter-spacing:3px;text-transform:uppercase;color:#444;">MOOSERMAIL</p>
            <p style="margin:0;font-family:Arial,sans-serif;font-size:11px;color:#333;">
              <a href="https://mooser.email" style="color:#444;text-decoration:none;">mooser.email</a>
              &nbsp;&middot;&nbsp;
              <span>Didn't request this? Your account is safe.</span>
            </p>
          </td>
        </tr>

      </table>
    </td>
  </tr>
</table>
</body>
</html>
