<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>You've been invited to Moosermail</title>
</head>
<body style="margin:0;padding:0;background:#0d0d0d;font-family:Arial,Helvetica,sans-serif;">
  <table width="100%" cellpadding="0" cellspacing="0" style="background:#0d0d0d;padding:48px 16px;">
    <tr>
      <td align="center">
        <table width="100%" cellpadding="0" cellspacing="0" style="max-width:520px;">

          <!-- Logo -->
          <tr>
            <td align="center" style="padding-bottom:32px;">
              <span style="font-family:Impact,'Arial Black',Arial,sans-serif;font-size:28px;letter-spacing:4px;color:#f2f2f2;text-transform:uppercase;">
                MOOSERMAIL
              </span>
            </td>
          </tr>

          <!-- Card -->
          <tr>
            <td style="background:#171717;border-radius:24px;padding:48px 40px;">

              <p style="font-family:Impact,'Arial Black',Arial,sans-serif;font-size:36px;letter-spacing:2px;color:#f2f2f2;margin:0 0 8px;text-transform:uppercase;">
                YOU'VE BEEN<br>INVITED.
              </p>

              <p style="font-size:14px;letter-spacing:2px;text-transform:uppercase;color:#888;margin:0 0 32px;">
                Accept your invitation to get access to Moosermail.
              </p>

              <table cellpadding="0" cellspacing="0" style="margin-bottom:32px;">
                <tr>
                  <td style="background:#f2f2f2;border-radius:100px;padding:14px 32px;">
                    <a href="{{ .ConfirmationURL }}"
                       style="font-family:Impact,'Arial Black',Arial,sans-serif;font-size:16px;letter-spacing:3px;color:#0d0d0d;text-decoration:none;text-transform:uppercase;white-space:nowrap;">
                      ACCEPT INVITE
                    </a>
                  </td>
                </tr>
              </table>

              <p style="font-size:12px;letter-spacing:1px;text-transform:uppercase;color:#888;margin:0 0 8px;">
                Or copy this link into your browser:
              </p>
              <p style="font-size:11px;color:#555;word-break:break-all;margin:0 0 32px;">
                {{ .ConfirmationURL }}
              </p>

              <p style="font-size:12px;letter-spacing:1px;text-transform:uppercase;color:#555;margin:0;">
                Not expecting this? Ignore it.
              </p>

            </td>
          </tr>

          <!-- Footer -->
          <tr>
            <td align="center" style="padding-top:32px;">
              <p style="font-size:11px;letter-spacing:1px;text-transform:uppercase;color:#555;margin:0;">
                MOOSERMAIL - THE MISSING INBOX FOR RESEND
              </p>
              <p style="font-size:11px;color:#555;margin:4px 0 0;">
                <a href="https://mooser.email" style="color:#555;text-decoration:none;">mooser.email</a>
              </p>
            </td>
          </tr>

        </table>
      </td>
    </tr>
  </table>
</body>
</html>
