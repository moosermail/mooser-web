# ── Rate limiting zones ───────────────────────────────────────
# Applied only to mooser.email domains — does not affect supp configs
limit_req_zone  $binary_remote_addr zone=mooser_api:10m  rate=10r/m;
limit_req_zone  $binary_remote_addr zone=mooser_web:10m  rate=60r/m;
limit_conn_zone $binary_remote_addr zone=mooser_conn:10m;

# ── Shared security headers map ───────────────────────────────
map $sent_http_content_type $mooser_csp {
    default "default-src 'self'; script-src 'self' 'unsafe-inline' 'unsafe-eval'; style-src 'self' 'unsafe-inline'; img-src 'self' data: https:; font-src 'self' data:; connect-src 'self' https://*.supabase.co wss://*.supabase.co https://api.stripe.com; frame-src https://js.stripe.com https://hooks.stripe.com; object-src 'none'; base-uri 'self';";
}

# ── mooser.email (Landing Page) ──────────────────────────────
server {
    listen 80;
    server_name mooser.email www.mooser.email;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl;
    server_name mooser.email www.mooser.email;

    ssl_certificate     /etc/letsencrypt/live/mooser.email/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/mooser.email/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305;
    ssl_prefer_server_ciphers off;
    ssl_session_cache   shared:SSL:10m;
    ssl_session_timeout 1d;

    # Security headers
    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;
    add_header X-Frame-Options           "SAMEORIGIN" always;
    add_header X-Content-Type-Options    "nosniff" always;
    add_header X-XSS-Protection          "1; mode=block" always;
    add_header Referrer-Policy           "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy        "camera=(), microphone=(), geolocation=()" always;
    add_header Content-Security-Policy   $mooser_csp always;

    # Hide nginx version
    server_tokens off;

    limit_conn mooser_conn 20;

    location / {
        limit_req zone=mooser_web burst=30 nodelay;
        proxy_pass         http://127.0.0.1:4000;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
    }
}

# ── mcp.mooser.email (MCP Server) ────────────────────────────
server {
    listen 80;
    server_name mcp.mooser.email;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl;
    server_name mcp.mooser.email;

    ssl_certificate     /etc/letsencrypt/live/mooser.email/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/mooser.email/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305;
    ssl_prefer_server_ciphers off;
    ssl_session_cache   shared:SSL:10m;
    ssl_session_timeout 1d;

    # Security headers
    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;
    add_header X-Frame-Options           "DENY" always;
    add_header X-Content-Type-Options    "nosniff" always;
    add_header Referrer-Policy           "no-referrer" always;

    server_tokens off;

    # MCP is API-only: tight rate limiting
    limit_conn mooser_conn 10;

    location / {
        limit_req zone=mooser_api burst=20 nodelay;
        proxy_pass         http://127.0.0.1:4001;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 300s;
    }
}

# ── app.mooser.email (Next.js Web App) ───────────────────────
server {
    listen 80;
    server_name app.mooser.email;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl;
    server_name app.mooser.email;

    ssl_certificate     /etc/letsencrypt/live/mooser.email/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/mooser.email/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305;
    ssl_prefer_server_ciphers off;
    ssl_session_cache   shared:SSL:10m;
    ssl_session_timeout 1d;

    # Security headers
    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;
    add_header X-Frame-Options           "SAMEORIGIN" always;
    add_header X-Content-Type-Options    "nosniff" always;
    add_header X-XSS-Protection          "1; mode=block" always;
    add_header Referrer-Policy           "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy        "camera=(), microphone=(), geolocation=()" always;
    add_header Content-Security-Policy   $mooser_csp always;

    server_tokens off;

    limit_conn mooser_conn 20;

    # Tighter rate limit on API routes
    location /api/ {
        limit_req zone=mooser_api burst=20 nodelay;
        proxy_pass         http://127.0.0.1:4002;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
    }

    location / {
        limit_req zone=mooser_web burst=30 nodelay;
        proxy_pass         http://127.0.0.1:4002;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_set_header   Upgrade           $http_upgrade;
        proxy_set_header   Connection        "upgrade";
        proxy_read_timeout 60s;
    }
}
