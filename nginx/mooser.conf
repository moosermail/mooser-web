# ── mooser.email (Landing Page) ──────────────────────────────
server {
    listen 80;
    server_name mooser.email www.mooser.email;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl;
    server_name mooser.email www.mooser.email;

    ssl_certificate     /etc/letsencrypt/live/mooser.email/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/mooser.email/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;

    location / {
        proxy_pass         http://127.0.0.1:4000;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
    }
}

# ── mcp.mooser.email (MCP Server) ────────────────────────────
server {
    listen 80;
    server_name mcp.mooser.email;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl;
    server_name mcp.mooser.email;

    ssl_certificate     /etc/letsencrypt/live/mcp.mooser.email/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/mcp.mooser.email/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;

    location / {
        proxy_pass         http://127.0.0.1:4001;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
