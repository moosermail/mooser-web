# -- Rate limiting zones --
# Applied only to mooser.email domains
limit_req_zone  $binary_remote_addr zone=mooser_api:10m  rate=10r/m;
limit_req_zone  $binary_remote_addr zone=mooser_web:10m  rate=60r/m;
limit_conn_zone $binary_remote_addr zone=mooser_conn:10m;

# -- Shared security headers map --
map $sent_http_content_type $mooser_csp {
    default "default-src 'self'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; img-src 'self' data: https:; font-src 'self' data: https://fonts.gstatic.com; connect-src 'self'; frame-src 'self'; object-src 'none'; base-uri 'self';";
}

# -- mooser.email (Landing Page) --
server {
    listen 80;
    server_name mooser.email www.mooser.email;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl;
    server_name mooser.email www.mooser.email;

    ssl_certificate     /etc/letsencrypt/live/mooser.email/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/mooser.email/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305;
    ssl_prefer_server_ciphers off;
    ssl_session_cache   shared:SSL:10m;
    ssl_session_timeout 1d;

    # Security headers
    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;
    add_header X-Frame-Options           "SAMEORIGIN" always;
    add_header X-Content-Type-Options    "nosniff" always;
    add_header X-XSS-Protection          "1; mode=block" always;
    add_header Referrer-Policy           "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy        "camera=(), microphone=(), geolocation=()" always;
    add_header Content-Security-Policy   $mooser_csp always;

    # Hide nginx version
    server_tokens off;

    limit_conn mooser_conn 20;

    location / {
        limit_req zone=mooser_web burst=30 nodelay;
        proxy_pass         http://127.0.0.1:4000;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
    }
}

# -- mcp.mooser.email (MCP Server) --
server {
    listen 80;
    server_name mcp.mooser.email;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl;
    server_name mcp.mooser.email;

    ssl_certificate     /etc/letsencrypt/live/mooser.email/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/mooser.email/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305;
    ssl_prefer_server_ciphers off;
    ssl_session_cache   shared:SSL:10m;
    ssl_session_timeout 1d;

    # Security headers
    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;
    add_header X-Frame-Options           "DENY" always;
    add_header X-Content-Type-Options    "nosniff" always;
    add_header Referrer-Policy           "no-referrer" always;

    server_tokens off;

    proxy_intercept_errors on;
    error_page 502 /502.html;
    error_page 503 /503.html;
    error_page 504 /504.html;
    location = /502.html { root /home/mooser/app/landing; internal; }
    location = /503.html { root /home/mooser/app/landing; internal; }
    location = /504.html { root /home/mooser/app/landing; internal; }

    # MCP is API-only: tight rate limiting
    limit_conn mooser_conn 10;

    location / {
        limit_req zone=mooser_api burst=20 nodelay;
        proxy_pass         http://127.0.0.1:4001;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 300s;
    }
}

# -- api.mooser.email (API proxy to app) --
server {
    listen 80;
    server_name api.mooser.email;
    location /.well-known/acme-challenge/ { root /home/mooser/acme; }
    location / { return 301 https://$host$request_uri; }
}

server {
    listen 443 ssl;
    server_name api.mooser.email;

    ssl_certificate     /etc/letsencrypt/live/moose.mooser.email-fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/moose.mooser.email-privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305;
    ssl_prefer_server_ciphers off;

    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;
    add_header X-Content-Type-Options "nosniff" always;
    set $cors_origin "";
    if ($http_origin = "https://app.mooser.email") { set $cors_origin $http_origin; }
    if ($http_origin = "https://mooser.email") { set $cors_origin $http_origin; }
    if ($http_origin = "https://status.mooser.email") { set $cors_origin $http_origin; }
    add_header Access-Control-Allow-Origin $cors_origin always;
    add_header Access-Control-Allow-Methods "GET, POST, PUT, PATCH, DELETE, OPTIONS" always;
    add_header Access-Control-Allow-Headers "Authorization, Content-Type" always;
    add_header Access-Control-Allow-Credentials "true" always;

    server_tokens off;

    # Handle CORS preflight
    if ($request_method = OPTIONS) {
        return 204;
    }

    proxy_intercept_errors on;
    error_page 502 /502.html;
    error_page 503 /503.html;
    error_page 504 /504.html;
    location = /502.html { root /home/mooser/app/landing; internal; }
    location = /503.html { root /home/mooser/app/landing; internal; }
    location = /504.html { root /home/mooser/app/landing; internal; }

    location / {
        limit_req zone=mooser_api burst=30 nodelay;
        # Rewrite: api.mooser.email/templates -> app:4002/api/templates
        rewrite ^/(.*)$ /api/$1 break;
        proxy_pass         http://127.0.0.1:4002;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
    }
}

# -- app.mooser.email (Next.js Web App) --
server {
    listen 80;
    server_name app.mooser.email;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl;
    server_name app.mooser.email;

    ssl_certificate     /etc/letsencrypt/live/mooser.email/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/mooser.email/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305;
    ssl_prefer_server_ciphers off;
    ssl_session_cache   shared:SSL:10m;
    ssl_session_timeout 1d;

    # Security headers
    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;
    add_header X-Frame-Options           "SAMEORIGIN" always;
    add_header X-Content-Type-Options    "nosniff" always;
    add_header X-XSS-Protection          "1; mode=block" always;
    add_header Referrer-Policy           "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy        "camera=(), microphone=(), geolocation=()" always;
    add_header Content-Security-Policy   $mooser_csp always;

    server_tokens off;

    # Custom error pages
    proxy_intercept_errors on;
    error_page 403 /403.html;
    error_page 429 /429.html;
    error_page 502 /502.html;
    error_page 503 /503.html;
    error_page 504 /504.html;
    location = /403.html { root /home/mooser/app/landing; internal; }
    location = /429.html { root /home/mooser/app/landing; internal; }
    location = /502.html { root /home/mooser/app/landing; internal; }
    location = /503.html { root /home/mooser/app/landing; internal; }
    location = /504.html { root /home/mooser/app/landing; internal; }

    limit_conn mooser_conn 20;

    # Tighter rate limit on API routes
    location /api/ {
        limit_req zone=mooser_api burst=20 nodelay;
        proxy_pass         http://127.0.0.1:4002;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
    }

    location / {
        limit_req zone=mooser_web burst=30 nodelay;
        proxy_pass         http://127.0.0.1:4002;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_set_header   Upgrade           $http_upgrade;
        proxy_set_header   Connection        "upgrade";
        proxy_read_timeout 60s;
    }
}

# -- moose.mooser.email / wait.mooser.email / idk.mooser.email (easter eggs) --
server {
    listen 80;
    server_name moose.mooser.email wait.mooser.email idk.mooser.email;
    location /.well-known/acme-challenge/ { root /home/mooser/acme; }
    location / { return 301 https://$host$request_uri; }
}

server {
    listen 443 ssl;
    server_name moose.mooser.email wait.mooser.email idk.mooser.email;

    ssl_certificate     /etc/letsencrypt/live/moose.mooser.email-fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/moose.mooser.email-privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    server_tokens off;

    set $moose_page "moose.html";
    if ($host = "wait.mooser.email") { set $moose_page "wait.html"; }
    if ($host = "idk.mooser.email") { set $moose_page "idk.html"; }

    location / {
        root /home/mooser/app/landing;
        try_files /$moose_page =404;
    }

    location /assets/ {
        root /home/mooser/app/landing;
    }
}
